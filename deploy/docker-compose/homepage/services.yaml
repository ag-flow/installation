# Homepage — ressources listées
# Doc : https://gethomepage.dev/configs/services/
# {{HOMEPAGE_VAR_BASE_DOMAIN}} est injecté depuis l'env (BASE_DOMAIN du compose).

- ag-flow:
    - Portal:
        icon: mdi-developer-board
        href: https://{{HOMEPAGE_VAR_BASE_DOMAIN}}
        description: Workspaces DevPod (portail)
    - RAG:
        icon: mdi-database-search
        href: https://rag.{{HOMEPAGE_VAR_BASE_DOMAIN}}/ui
        description: Recherche augmentée (RAG)
    - Doc:
        icon: mdi-file-document-multiple
        href: https://doc.{{HOMEPAGE_VAR_BASE_DOMAIN}}
        description: Gestion documentaire (docflow)

- Plateforme:
    - Harpocrate (Vault):
        icon: mdi-shield-key
        href: https://vault.yoops.org
        description: Coffre de secrets
    - Keycloak (SSO):
        icon: mdi-account-key
        href: https://security.yoops.org
        description: Authentification / OIDC
