# ============================================================================
# ag-flow — Stack mutualisée (rag + doc)
#
# Mutualisation :
#   - postgres : UNE instance pgvector partagée.
#       • rôle/DB "rag" (superuser → crée les DB workspace dynamiques de rag)
#       • rôle/DB "docflow" créés par ./initdb/10-docflow.sh au 1er démarrage
#   - réseau "agflow" commun
#   - reverse-proxy "caddy" commun : rag en hôte par défaut (:80),
#     doc en sous-domaine doc.{BASE_DOMAIN}
#
# Images : PULL depuis ghcr.io/ag-flow (rag-backend, rag-frontend, doc).
# ============================================================================
services:

  # ── Base de données mutualisée ─────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: agflow-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # Lu par initdb/10-docflow.sh pour créer le rôle docflow.
      DOC_DB_PASSWORD: ${DOC_DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [agflow]

  # ── rag : backend FastAPI ──────────────────────────────────────────────────
  backend:
    image: ghcr.io/ag-flow/rag-backend:${IMAGE_TAG:-latest}
    container_name: rag-backend
    restart: always
    env_file: .env
    environment:
      ENVIRONMENT: prod
      GIT_SHA: ${GIT_SHA:-}
      # Construits ici depuis les variables Postgres — ne pas mettre dans .env
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      RAG_POSTGRES_ADMIN_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/postgres
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - rag_repos:/var/lib/rag/repos
      - ./pricing.yml:/app/config/pricing.yml:ro
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks: [agflow]

  # ── rag : frontend Nginx (SPA) ─────────────────────────────────────────────
  frontend:
    image: ghcr.io/ag-flow/rag-frontend:${IMAGE_TAG:-latest}
    container_name: rag-frontend
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks: [agflow]

  # ── doc (docflow) : app unique UI+API ──────────────────────────────────────
  doc:
    image: ghcr.io/ag-flow/doc:${DOC_IMAGE_TAG:-latest}
    container_name: docflow
    restart: always
    environment:
      DATABASE_URL: postgresql://docflow:${DOC_DB_PASSWORD}@postgres:5432/docflow
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      LOG_LEVEL: ${DOC_LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks: [agflow]

  # ── Reverse-proxy mutualisé ────────────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: agflow-caddy
    restart: always
    environment:
      BASE_DOMAIN: ${BASE_DOMAIN:-agflow.local}
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
      doc:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks: [agflow]

volumes:
  postgres_data:
  rag_repos:
  caddy_data:
  caddy_config:

networks:
  agflow:
    driver: bridge
